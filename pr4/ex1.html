<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }

        .container {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px;
            background: #eee;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        li:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Мій список</h2>

    <input type="text" placeholder="Введіть значення..." id="inputField">

    <button id="addBtn">Додати</button>
    <button id="sortBtn">Сортувати А-Я</button>

    <ul id="list"></ul>
</div>

<script src="ex1.js"></script>

</body>
</html>
