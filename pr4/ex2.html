<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Таймер</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
        background: #f4f4f4;
    }
    #timer {
        font-size: 40px;
        margin: 20px 0;
        padding: 10px;
        border: 1px solid #ccc;
        display: inline-block;
        min-width: 120px;
    }
    input, button {
        padding: 5px 10px;
        margin: 5px;
    }
</style>
</head>
<body>

<h2>Таймер зворотного відліку</h2>

<input type="number" id="timeInput" value="60" min="1"><br>

<div id="timer">60</div><br>

<button id="startBtn">Старт</button>
<button id="pauseBtn">Пауза</button>
<button id="addBtn">+10 сек</button>
<button id="subBtn">-10 сек</button>

<script src="ex2.js"></script>

</body>
</html>
