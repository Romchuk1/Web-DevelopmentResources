<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Форма користувача</title>

<style>
  body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
    margin-top: 50px;
  }

  form {
    background: white;
    padding: 20px;
    display: inline-block;
    border-radius: 10px;
  }

  input {
    display: block;
    margin: 10px auto;
    padding: 8px;
    width: 200px;
  }

  button {
    margin-top: 10px;
    padding: 8px 15px;
    cursor: pointer;
  }

  #status {
    margin-top: 15px;
    font-weight: bold;
  }
</style>

</head>
<body>

<h2>Форма користувача</h2>

<form id="form">
  <input id="name" placeholder="Ім'я">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Телефон">
  <input id="password" type="password" placeholder="Пароль">
  
  <button type="submit">Увійти</button>
</form>

<button id="clear">Очистити</button>

<p id="status"></p>

<script src="pr7.js"></script>
</body>
</html>
